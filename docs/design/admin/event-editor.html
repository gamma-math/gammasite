<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GamMa Designudkast - Event Editor Admin</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="menu-page-body">
  <header class="site-header frontpage-header">
    <div class="page-shell">
      <div class="frontpage-topbar">
        <a class="brand" href="../index.html">
          <img src="../../../wwwroot/lib/logo_blue.png" alt="GamMa logo">
        </a>
        <div class="frontpage-topbar-actions" aria-label="Admin navigation">
          <div class="frontpage-left-actions">
            <a class="frontpage-button frontpage-button-secondary" href="begivenheder.html">Menu</a>
            <a class="frontpage-button frontpage-button-secondary" href="beskeder.html">Admin</a>
          </div>
          <div class="frontpage-right-actions">
            <a class="frontpage-profile-link frontpage-profile-link-default" href="profil.html" aria-label="Profil">
              <svg class="frontpage-avatar-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4.5 20c1.9-3.7 5-5.5 7.5-5.5S17.6 16.3 19.5 20"></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main class="menu-shell">
    <section class="menu-workspace">
      <aside class="menu-sidebar">
        <h2 class="menu-sidebar-title">Menu</h2>
        <nav class="menu-side-nav" aria-label="Admin sektioner">
          <a class="menu-side-link is-active" href="begivenheder.html">Begivenheder</a>
          <a class="menu-side-link" href="nyheder.html">Nyheder</a>
          <a class="menu-side-link" href="medlemmer.html">Medlemmer</a>
          <a class="menu-side-link" href="betal-medlemskab.html">Betal medlemskab</a>
        </nav>
      </aside>
      <section class="menu-content">
        <div class="menu-panel-header">
          <div>
            <p class="menu-section-title">Begivenheder</p>
            <h1>Opret / rediger event</h1>
          </div>
        </div>
        <form class="menu-editor-form">
          <div class="menu-editor-upload">
            <strong>Billede</strong>
            <span>Upload eventbillede eller brug den eksisterende forsidegrafik for arrangementet.</span>
            <button class="admin-action-button" type="button">Vælg billede</button>
          </div>
          <label class="admin-field">
            <span>Titel</span>
            <input type="text" value="Karriere efter matematik">
          </label>
          <label class="admin-field">
            <span>Tekst</span>
            <textarea>GamMa inviterer til en aften med fokus på karriereveje efter matematikstudiet. Her kan arrangementsteksten redigeres i fuld længde.</textarea>
          </label>
          <div class="menu-editor-grid">
            <label class="admin-field">
              <span>Facebook</span>
              <input type="url" value="https://facebook.com/">
            </label>
            <label class="admin-field">
              <span>Instagram</span>
              <input type="url" value="https://instagram.com/">
            </label>
            <label class="admin-field">
              <span>Linked In</span>
              <input type="url" value="https://linkedin.com/">
            </label>
            <label class="admin-field">
              <span>Betalingslink</span>
              <input type="url" value="https://example.com/betal">
            </label>
          </div>
          <div class="menu-editor-link-row">
            <label class="admin-field">
              <span>Tilføj link</span>
              <input type="url" placeholder="https://ekstra-link.dk">
            </label>
            <label class="admin-field">
              <span>Tilføj link</span>
              <input type="url" placeholder="https://ekstra-link-2.dk">
            </label>
            <button class="menu-inline-add-button" type="button"><strong>+</strong><span>Tilføj link</span></button>
          </div>
          <div class="menu-editor-grid">
            <label class="admin-field">
              <span>Sted</span>
              <input type="text" value="Nørreport">
            </label>
            <label class="admin-field">
              <span>Start</span>
              <input type="datetime-local" value="2026-09-25T17:00">
            </label>
            <label class="admin-field">
              <span>Slut</span>
              <input type="datetime-local" value="2026-09-25T20:30">
            </label>
          </div>
          <div class="menu-editor-actions">
            <button class="profile-button" type="submit">Gem</button>
            <button class="profile-button profile-button-danger" type="button">Slet</button>
          </div>
        </form>
      </section>
    </section>
  </main>
  <section class="frontpage-footer-band">
    <div class="page-shell frontpage-footer-inner">
      <div class="frontpage-footer-col frontpage-footer-col-wide">
        <h2>Alumneforeningen GamMa</h2>
        <ul class="frontpage-contact-list">
          <li>Vedt&aelig;gter: <a href="#">Link til dem</a></li>
          <li>CVR: 34637768</li>
          <li>Kontakt: <a href="mailto:bestyrelsen@gam-ma.dk">bestyrelsen@gam-ma.dk</a></li>
        </ul>
      </div>
      <div class="frontpage-footer-icons">
        <span class="frontpage-social-list">
          <a class="frontpage-social-link" href="#" aria-label="LinkedIn"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="4"></rect><path d="M7.2 9.2V17"></path><circle cx="7.2" cy="6.9" r="1"></circle><path d="M11 17V9.2"></path><path d="M11 11.6c0-1.6 1-2.6 2.5-2.6 1.5 0 2.3 1 2.3 3V17"></path></svg></a>
          <a class="frontpage-social-link" href="#" aria-label="Facebook"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 21v-7h2.3l.4-2.8h-2.7V9.4c0-.8.2-1.4 1.4-1.4H16V5.4c-.4-.1-1.1-.2-2-.2-2 0-3.4 1.2-3.4 3.5v2.5H8.3V14h2.3v7z"></path></svg></a>
          <a class="frontpage-social-link" href="#" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect><circle cx="12" cy="12" r="3.8"></circle><circle cx="17.2" cy="6.8" r="1"></circle></svg></a>
        </span>
      </div>
    </div>
  </section>
</body>
</html>
